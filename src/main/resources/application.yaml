spring:
  application:
    name: personal-task-manager-api
  #  jackson:
  #    deserialization:
  #      adjust-dates-to-context-time-zone: false
  security:
    name: admin
    password: mojehaslo123
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
    #    DB_CLOSE_DELAY: -1
    #    DB_CLOSE_ON_EXIT: FALSE
    #    AUTO_RECONNECT: TRUE
    #    MODE: PostgreSQL
    #    TO-DO: correct database connection
    #    datasource:
    #      url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    h2:
      console:
        enabled: true
        path: /h2-console
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379} # TO-DO: add password in the future
  jpa:
    defer-datasource-initialization: true
    show-sql: true
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    table: flyway_schema_history
logging:
  level:
    org:
      flywaydb: DEBUG
rsa:
  public-key: classpath:certs/publickey.pem
  private-key: classpath:certs/privatekey_pkcs8.pem